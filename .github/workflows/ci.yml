name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Structural + content invariants: manifests, skills↔skills-codex parity,
      # SKILL/agent/command frontmatter, namespace hygiene, and py/js/bash syntax.
      # Pure stdlib — also runnable locally with `python3 ci/validate.py`.
      - name: Validate plugin
        run: python3 ci/validate.py
